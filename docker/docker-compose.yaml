services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - "./:/app"
    ports: 
      - "3000:3000"
    environment:
      - DB_HOST=db
    env_file: .env
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:

